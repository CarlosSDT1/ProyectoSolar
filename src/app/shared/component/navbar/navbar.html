<div class="navbar bg-base-100 shadow-sm">
  <div class="navbar-start">
    <div class="dropdown">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
        </svg>
      </div>
      <ul
        tabindex="0"
        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-[1] mt-3 w-52 p-2 shadow">
        <li>
          <a [routerLink]="['/plantas']"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}">
            Lista
          </a>
        </li>
        <li>
          <a [routerLink]="['/tabla']"
             routerLinkActive="active"
             [routerLinkActiveOptions]="{exact: true}">
            Tabla
          </a>
        </li>
      </ul>
    </div>

    <div class="divider divider-horizontal mx-2"></div>
    <button
      class="btn btn-square btn-ghost"
      (click)="toggleTheme()">

      <svg xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          fill="currentColor"
          viewBox="0 0 16 16">
        <path d="M8 1a7 7 0 1 0 7 7A7 7 0 0 0 8 1z"/>
      </svg>

    </button>
  </div>

  <div class="navbar-center">
    <a [routerLink]="['/']" class="btn btn-ghost text-xl cursor-pointer">
      Proyecto Placa Solar
    </a>
  </div>

  <div class="navbar-end">
    @if (session()) {
      <div class="flex items-center gap-4">
        <form role="search">
          <input
            class="input input-bordered input-sm"
            type="search"
            placeholder="search"
            aria-label="search"
            [(ngModel)]="searchString"
            [ngModelOptions]="{standalone: true}"
            (ngModelChange)="search($event)"/>
        </form>

        <button
          type="button"
          class="btn btn-ghost flex items-center gap-2"
          (click)="goToProfile()">

          @if (profile()?.avatar_url) {
            <img
              [src]="profile()!.avatar_url!"
              alt="Avatar"
              class="w-8 h-8 rounded-full object-cover border">
          } @else {
            <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-sm">
              👤
            </div>
          }

          <span>{{ getDisplayName() }}</span>
        </button>

        <button (click)="logout()" class="text-error">
          <i class="fas fa-sign-out-alt mr-2"></i>
          Cerrar Sesión
        </button>
      </div>
    } @else {
      <div class="flex items-center gap-4">
        <a [routerLink]="['/login']"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: true}"
           class="btn btn-ghost">
          Login
        </a>
        <a [routerLink]="['/register']"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{exact: true}"
           class="btn btn-ghost">
          Register
        </a>
      </div>
    }
  </div>
</div>
