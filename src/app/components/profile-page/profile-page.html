<div class="max-w-3xl mx-auto p-6">
  <div class="card bg-base-100 shadow-xl">
    <div class="card-body">
      <h1 class="text-3xl font-bold mb-4">Mi perfil</h1>

      @if (isLoading()) {
        <p>Cargando perfil...</p>
      }

      @if (profileLoaded()) {
        <form [formGroup]="myForm" (ngSubmit)="onSubmit()" class="space-y-6">

          <div class="flex flex-col md:flex-row gap-6 items-start">
            <div class="flex flex-col items-center gap-3">
              @if (avatarPreview()) {
                <img
                  [src]="avatarPreview()!"
                  alt="Avatar"
                  class="w-32 h-32 rounded-full object-cover border" />
              } @else {
                <div class="w-32 h-32 rounded-full bg-gray-200 flex items-center justify-center text-4xl">
                  👤
                </div>
              }

              <input
                type="file"
                class="file-input file-input-bordered w-full max-w-xs"
                accept="image/*"
                (change)="onFileSelected($event)">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full">

              <div>
                <label class="label">
                  <span class="label-text">Email</span>
                </label>
                <input
                  type="text"
                  class="input input-bordered w-full"
                  formControlName="email">
              </div>

              <div>
                <label class="label">
                  <span class="label-text">Rol</span>
                </label>
                <input
                  type="text"
                  class="input input-bordered w-full"
                  formControlName="role">
              </div>

              <div>
                <label class="label">
                  <span class="label-text">Username</span>
                </label>
                <input
                  type="text"
                  class="input input-bordered w-full"
                  formControlName="username"
                  placeholder="Tu username">
              </div>

              <div>
                <label class="label">
                  <span class="label-text">Nombre completo</span>
                </label>
                <input
                  type="text"
                  class="input input-bordered w-full"
                  formControlName="full_name"
                  placeholder="Tu nombre completo">
              </div>

              <div class="md:col-span-2">
                <label class="label">
                  <span class="label-text">Avatar URL</span>
                </label>
                <input
                  type="text"
                  class="input input-bordered w-full"
                  formControlName="avatar_url"
                  placeholder="https://...">
              </div>

              <div class="md:col-span-2">
                <label class="label">
                  <span class="label-text">Website</span>
                </label>
                <input
                  type="text"
                  class="input input-bordered w-full"
                  formControlName="website"
                  placeholder="https://tuweb.com">
              </div>

            </div>
          </div>

          <div class="flex justify-end">
            <button
              class="btn btn-primary"
              type="submit"
              [disabled]="isSaving()">
              {{ isSaving() ? 'Guardando...' : 'Guardar perfil' }}
            </button>
          </div>
        </form>
      }
    </div>
  </div>
</div>
