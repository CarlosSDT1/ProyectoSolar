<app-plantas-list
  [refreshTrigger]="refreshList()"
  [profiles]="profiles()"
  (action)="onAction($event)" />

@if (showEditForm()) {
  <app-admin-tabla-edit
    [planta]="currentPlanta()"
    [profiles]="profiles()"
    (saved)="onSaved($event)"
    (cancelled)="onCancelled()">
  </app-admin-tabla-edit>
}
