<section class="mt-5">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
    @for (planta of plantas(); track planta.id; ) {
      <app-plantes-card

        [planta]="planta"
        (favoriteToggle)="toggleFavorite(planta)"/>
    }
    @empty {
      <div class="col-span-full">
        <h1 class="text-center py-8">
          No hay plantas eléctricas registradas
        </h1>
      </div>
    }
  </div>
</section>
